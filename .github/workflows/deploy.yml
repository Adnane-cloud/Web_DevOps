name: DevSecOps Pipeline — Eventium

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Every push to main   → runs all jobs, ends with deploy
#   • Every pull request   → runs security gates only (no deploy)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1 — PHP SYNTAX CHECK
  # Catches parse errors and fatal mistakes before anything else runs.
  # ══════════════════════════════════════════════════════════════════════════
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint all PHP files
        run: |
          echo "=== Checking PHP syntax for all files ==="
          find . -name "*.php" \
               -not -path "./.git/*" \
               -not -path "./vendor/*" \
            | xargs -r php -l
          echo "=== PHP syntax check passed ==="

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 — STATIC APPLICATION SECURITY TESTING (SAST)
  # Semgrep scans for OWASP Top 10 patterns: SQLi, XSS, insecure functions,
  # hardcoded secrets, etc.
  # Note: continue-on-error is true while known findings are being resolved.
  #       Remove it once all Semgrep findings are fixed.
  # ══════════════════════════════════════════════════════════════════════════
  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    continue-on-error: true        # ← remove once all findings are resolved
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep (PHP + OWASP Top 10 rules)
        run: |
          semgrep \
            --config "p/php" \
            --config "p/owasp-top-ten" \
            --error \
            --quiet \
            .

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3 — SECRET DETECTION
  # Gitleaks scans the latest commit for accidentally committed secrets
  # (API keys, passwords, tokens). Uses fetch-depth: 1 to scan current
  # HEAD only (not full history, which pre-dates our credential cleanup).
  # ══════════════════════════════════════════════════════════════════════════
  secret-scan:
    name: Secret Scan — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1           # scan latest commit only

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 4 — DEPLOY
  # Only runs on push to main (not on PRs) and only if ALL security gates
  # above have passed. Injects real DB credentials from GitHub Secrets into
  # database.php before uploading — credentials never touch the repository.
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to InfinityFree
    needs: [php-lint, sast, secret-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Inject real credentials from GitHub Secrets ─────────────────────
      # Replaces %%PLACEHOLDER%% tokens in database.php with real values.
      # The real credentials are never stored in the repository.
      - name: Inject database credentials
        env:
          DB_HOST:     ${{ secrets.DB_HOST }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          sed \
            -e "s|%%DB_HOST%%|${DB_HOST}|g" \
            -e "s|%%DB_NAME%%|${DB_NAME}|g" \
            -e "s|%%DB_USERNAME%%|${DB_USERNAME}|g" \
            -e "s|%%DB_PASSWORD%%|${DB_PASSWORD}|g" \
            app/config/database.php > app/config/database.php.tmp
          mv app/config/database.php.tmp app/config/database.php
          echo "=== Credentials injected successfully ==="

      # ── Upload to InfinityFree via FTP ──────────────────────────────────
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          server-dir: htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            README.md
            database.sql
            .gitignore
